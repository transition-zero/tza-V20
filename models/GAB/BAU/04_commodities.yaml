# -------------------------------------------------------------------------
#
#   COMMODITIES (DEMAND)
#   
#     Define the commodities that are used in the model, as well as 
#       the demand for each commodity in each region.
#
#     Link to docs: 
#       https://docs.feo.transitionzero.org/docs/tz-osemosys/commodity/
#
#     Authors:
#       - xx
#
# -------------------------------------------------------------------------

commodities:

  - id: coal
    long_name: Coal resource
    is_renewable: false 

  - id: gas
    long_name: Gas resource
    is_renewable: false

  - id: oil-diesel
    long_name: Diesel 
    is_renewable: false  

  - id: solar
    long_name: Solar resource
    is_renewable: false
  
  - id: wind-onshore
    long_name: Wind onshore resource
    is_renewable: false

  - id: wind-offshore
    long_name: Wind offshore resource
    is_renewable: false

  - id: hydro 
    long_name: Hydro resource
    is_renewable: false

  - id: uranium
    long_name: Uranium resource
    is_renewable: false

  - id: geothermal
    long_name: Geothermal resource
    is_renewable: false

  - id: bioenergy
    long_name: Bioenergy resource
    is_renewable: false

  - id: primary-electricity
    long_name: Primary electricity
    is_renewable: false

  - id: secondary-electricity
    long_name: Secondary electricity
    is_renewable: false
    # specify annual demands
    demand_annual: 
      # define demand for each region
      GAB:
        "{ y : (${global_variables.base_demand}*(1+${global_variables.demand_growth_pcgt})**(y-${global_variables.base_year})) for y in ${time_definition.years} }"
        
    # specify demand profile for each region
    demand_profile:
      # all regions
      "*" :
        # all years
        "*" :
          # demand by timeslice
          # source: Global interconnector study 
          # (https://github.com/transition-zero/feo-esmod-osemosys/blob/master/resources/data/custom_nodes/specified_demand_profile.csv)
          s1-h1: 0.10617
          s1-h2: 0.10832
          s1-h3: 0.11112
          s1-h4: 0.08834
          s2-h1: 0.14989
          s2-h2: 0.15235
          s2-h3: 0.15679
          s2-h4: 0.12456
