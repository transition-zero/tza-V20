# -------------------------------------------------------------------------
#
#   COSTS
#   
#     Define all cost parameters for the model. Specifically:
#       - Depreciation method
#       - Discount rate
#       - Cost of capital
#       - Capital costs
#       - Fixed O&M costs
#       - Fuel prices
#
#     Link to docs: 
#       https://docs.feo.transitionzero.org/docs/tz-osemosys/technology/
#
#     Authors:
#       - xx
#
# -------------------------------------------------------------------------

# ------------------
# Financial methods
# ------------------

depreciation_method: "straight-line"

# -------------------------------
# social discount rate by region
# -------------------------------
discount_rate: 
  "*": 0.05

# ------------------------------
# cost of capital by technology
# ------------------------------
cost_of_capital: # WACC
  # all regions
  "*" :
    # all technologies
    "*": 0.11
    # coal-supercritical: 0.11
    # coal-subcritical: 0.11
    # nuclear: 0.11
    # solar-pv: 0.11
    # windonshore-power: 0.11
    # hydropower: 0.11
    # geo-power: 0.11
    # biogas-power: 0.11
    # transmission: 0.11


# --------------
# Capital costs
# --------------

capex_base_cost: # unit: $/kW
  coal-supercritical: 2500
  coal-subcritical: 2500
  coal-ultrasupercritical: 2500
  gas-CCGT: 1200
  gas-OCGT: 1200
  oil-internal-combustion-engine: 1450
  solar-pv: 1063
  solar-csp: 3427
  windonshore-power: 1251
  windoffshore-power: 3211
  hydropower: 3000
  geo-power: 4000
  bioenergy-power: 2500
  nuclear-power: 6137
  battery-technology: 463 # USD/kWh; Source: mid value of https://www.nrel.gov/docs/fy23osti/85332.pdf
  # transmission: 

capex_cagr: 
  coal-supercritical: 1
  coal-subcritical: 1
  coal-ultrasupercritical: 1
  gas-CCGT: 1
  gas-OCGT: 1
  oil-internal-combustion-engine: 1
  solar-pv: 0.98528
  solar-csp: 0.98887
  windonshore-power: 0.98878
  windoffshore-power: 0.98683
  hydropower: 1
  geo-power: 1
  bioenergy-power: 1
  nuclear-power: 1
  battery-technology: 0.97279 # Source: mid value of https://www.nrel.gov/docs/fy23osti/85332.pdf
  # transmission: 


capex:
  coal-supercritical:
    # all regions
    GAB: 
      # all years
      "{y: ${capex_base_cost.coal-supercritical} * (${capex_cagr.coal-supercritical} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"
      # "*": "{y: ${capex_base_cost.coal-supercritical} * (1+${capex_cagr.coal-supercritical})**(y-min(${time_definition.years})) for y in ${time_definition.years}}"

  coal-subcritical:
    GAB:
      "{y: ${capex_base_cost.coal-subcritical} * (${capex_cagr.coal-subcritical} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  coal-ultrasupercritical:
    GAB:
      "{y: ${capex_base_cost.coal-ultrasupercritical} * (${capex_cagr.coal-ultrasupercritical} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  gas-CCGT:    
    GAB:
      "{y: ${capex_base_cost.gas-CCGT} * (${capex_cagr.gas-CCGT} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"
  
  gas-OCGT:
    GAB:
      "{y: ${capex_base_cost.gas-OCGT} * (${capex_cagr.gas-OCGT} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  oil-internal-combustion-engine:
    GAB:
      "{y: ${capex_base_cost.oil-internal-combustion-engine} * (${capex_cagr.oil-internal-combustion-engine} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"
        
  solar-pv: 
    GAB:
      "{y: ${capex_base_cost.solar-pv} * (${capex_cagr.solar-pv} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  solar-csp: 
    GAB:
      "{y: ${capex_base_cost.solar-csp} * (${capex_cagr.solar-csp} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  windonshore-power:
    GAB:
      "{y: ${capex_base_cost.windonshore-power} * (${capex_cagr.windonshore-power} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  windoffshore-power:
    GAB:
      "{y: ${capex_base_cost.windoffshore-power} * (${capex_cagr.windoffshore-power} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  hydropower: 
    GAB:
      "{y: ${capex_base_cost.hydropower} * (${capex_cagr.hydropower} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  geo-power: 
    GAB:
      "{y: ${capex_base_cost.geo-power} * (${capex_cagr.geo-power} ** (y-min(${time_definition.years}))) for y in ${time_definition.years}}"

  bioenergy-power: 
